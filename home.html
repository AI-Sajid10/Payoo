<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="payoo-resources/assets/logo.png" type="image/x-icon">
    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex">
                <div class="logo">
                    <img src="payoo-resources/assets/logo.png" alt="payoo-logo" class="w-[60px]">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$<span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="index.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>
                    LogOut</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>

        <div class="buttons grid grid-cols-3 gap-3">
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-xl">
                <img src="payoo-resources/assets/opt-1.png" alt="opt-1">
                <p>Add Money</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-xl">
                <img src="payoo-resources/assets/opt-2.png" alt="opt-2">
                <p>Cashout</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-xl">
                <img src="payoo-resources/assets/opt-3.png" alt="opt-3">
                <p>Transfer Money</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-xl">
                <img src="payoo-resources/assets/opt-4.png" alt="opt-4">
                <p>Get Bonous</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-xl">
                <img src="payoo-resources/assets/opt-5.png" alt="opt-5">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex-col h-full py-4 btn-primary btn-soft rounded-xl">
                <img src="payoo-resources/assets/opt-6.png" alt="opt-6">
                <p>Transaction</p>
            </button>
        </div>
    </section>

    <section id="add-money" class="w-11/12 mx-auto mb-3">
        <h2 class="text-2xl font-bold mb-5">Add Money</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Select A Bank</label>
                    <select class="select text-neutral/50 bg-base-200 rounded-full w-full">
                        <option disabled selected class="text-neutral/50 bg-base-200">Select Bank</option>
                        <option>Islami Bank Bangladesh Limited(IBBL)</option>
                        <option>Dutch-Bangla Bank Limited(DBBL)</option>
                        <option>City Bank</option>
                        <option>BRAC Bank</option>
                    </select>
                    <label class="label text-neutral font-bold">Bank Account Number</label>
                    <input id="mobile-number" type="text" class="input rounded-full bg-base-200"
                        placeholder="Enter 11 digit account number" maxlength="11" />
                    <label class="label text-neutral font-bold">Amount to Add</label>
                    <input id="amount" type="number" class="input rounded-full bg-base-200"
                        placeholder="Enter amount to add" />
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="input-pin" type="password" class="input rounded-full bg-base-200"
                        placeholder="Enter your 4-digit pin" maxlength="4" />
                    <div><a class="link link-hover">Forgot password?</a></div>
                    <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>


    <section id="cashout" class="w-11/12 mx-auto">
        <h2 class="text-2xl font-bold mb-5">Cash Out</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Agent Number</label>
                    <input id="mobile-number" type="text" class="input rounded-full bg-base-200"
                        placeholder="Enter 11 digit number" maxlength="11" />
                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="amount" type="number" class="input rounded-full bg-base-200"
                        placeholder="Enter amount to withdraw" />
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="input-pin" type="password" class="input rounded-full bg-base-200"
                        placeholder="Enter your 4-digit pin" maxlength="4" />
                    <div><a class="link link-hover">Forgot password?</a></div>
                    <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
                </fieldset>
            </div>
        </div>
    </section>


    <script src="script/home.js"></script>

</body>

</html>
